apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-app
  namespace: chaos-engineering
  labels:
    app.kubernetes.io/name: chaos-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chaos-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaos-app
    spec:
      containers:
      - name: chaos-app
        image: nginx:latest
        ports:
        - containerPort: 80