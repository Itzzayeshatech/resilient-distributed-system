apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-app
  namespace: chaos-engineering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-app
  template:
    metadata:
      labels:
        app: chaos-app   # ✅ IMPORTANT LABEL
    spec:
      containers:
      - name: chaos-app
        image: nginx
        ports:
        - containerPort: 80